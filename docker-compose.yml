version: '3.8'

services:

  backend:
    build: ./backend
    container_name: code-translator-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: code-translator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped